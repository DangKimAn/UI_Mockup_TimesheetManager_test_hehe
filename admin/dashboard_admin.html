<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Timesheet System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        /* Topbar */
        .topbar {
            background: #1f2937;
            color: white;
            padding: 15px 30px;
        }

        .topbar img {
            border: 2px solid white;
        }

        /* Sidebar */
        .sidebar {
            background: #ffffff;
            height: 100vh;
            padding: 20px;
            border-right: 1px solid #e3e6f0;
        }

        .sidebar a {
            display: block;
            padding: 10px 0;
            text-decoration: none;
            color: #4e73df;
            font-weight: 500;
        }

        .sidebar a:hover {
            color: #224abe;
        }

        /* Dashboard Area */
        .dashboard-area {
            padding: 40px;
        }

        /* Checkin Card */
        .checkin-card {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 600px;
            margin: auto;
            text-align: center;
        }

        #clock {
            font-size: 48px;
            font-weight: bold;
            color: #4e73df;
            margin: 20px 0;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 25px;
            border-radius: 30px;
            background: #f8d7da;
            color: #842029;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .info-box {
            background: #f8f9fc;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            text-align: left;
        }

        .check-btn {
            background: #28a745;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 30px;
            font-size: 18px;
            color: white;
            font-weight: bold;
        }

        .check-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

<!-- Topbar -->
<div class="topbar d-flex justify-content-between align-items-center">

    <h5 class="mb-0">Timesheet System</h5>

    <div class="d-flex align-items-center">

        <!-- Avatar -->
        <img src="https://i.pravatar.cc/40"
             alt="avatar"
             class="rounded-circle me-2"
             width="40"
             height="40">

        <!-- Username -->
        <span class="me-3">Xin chào, <b>Admin</b></span>

        <!-- Logout Button -->
        <button class="btn btn-danger btn-sm">
            Logout
        </button>

    </div>
</div>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
          <!-- <a href="#">Dashboard</a> -->
    <a href="#">Xác nhận chấm công</a>
    <a href="#">Duyệt Timesheet</a>
    <a href="#">Duyệt đơn nghỉ phép</a>
    <a href="#">Quản lý loại nghỉ phép</a>
    <a href="#">Xuất báo cáo lương</a>
    <a href="#">Xuất báo cáo Timesheet</a>
    <a href="#"><b>Quản lý tài khoản</b></a>
        </div>

    </div>

</div>

        </div>

    </div>
</div>


</body>
</html>
