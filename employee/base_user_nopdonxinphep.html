<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Timesheet System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        /* Topbar */
        .topbar {
            background: #1f2937;
            color: white;
            padding: 15px 30px;
        }

        .topbar img {
            border: 2px solid white;
        }

        /* Sidebar */
        .sidebar {
            background: #ffffff;
            height: 100vh;
            padding: 20px;
            border-right: 1px solid #e3e6f0;
        }

        .sidebar a {
            display: block;
            padding: 10px 0;
            text-decoration: none;
            color: #4e73df;
            font-weight: 500;
        }

        .sidebar a:hover {
            color: #224abe;
        }

        /* Dashboard Area */
        .dashboard-area {
            padding: 40px;
        }

        /* Checkin Card */
        .checkin-card {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 600px;
            margin: auto;
            text-align: center;
        }

        #clock {
            font-size: 48px;
            font-weight: bold;
            color: #4e73df;
            margin: 20px 0;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 25px;
            border-radius: 30px;
            background: #f8d7da;
            color: #842029;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .info-box {
            background: #f8f9fc;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            text-align: left;
        }

        .check-btn {
            background: #28a745;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 30px;
            font-size: 18px;
            color: white;
            font-weight: bold;
        }

        .check-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

<!-- Topbar -->
<div class="topbar d-flex justify-content-between align-items-center">

    <h5 class="mb-0">Timesheet System</h5>

    <div class="d-flex align-items-center">

        <!-- Avatar -->
        <img src="https://i.pravatar.cc/40"
             alt="avatar"
             class="rounded-circle me-2"
             width="40"
             height="40">

        <!-- Username -->
        <span class="me-3">Xin chào, <b>Admin</b></span>

        <!-- Logout Button -->
        <button class="btn btn-danger btn-sm">
            Logout
        </button>

    </div>
</div>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
          <!-- <a href="#">Dashboard</a> -->
<a href="#">Check In / Check Out</a>
<a href="#">Lịch sử chấm công</a>
<a href="#">Đơn nghỉ phép</a>
<a href="#">Số dư phép</a>
<a href="#">Báo cáo cá nhân</a>
        </div>

        <!-- Dashboard Content -->
        <div class="col-md-10 dashboard-area">

            <div class="content-area">

    <!-- Title -->
    <div class="mb-4">
        <h4><b>Đơn xin nghỉ phép</b></h4>
        <p class="text-muted">Chọn cách gửi đơn nghỉ phép</p>
    </div>

    <!-- Tabs -->
    <ul class="nav nav-tabs mb-4" id="leaveTab" role="tablist">
        <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#formInput">
                📝 Điền form trực tiếp
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#pdfDownload">
                📄 Tải mẫu PDF
            </button>
        </li>
    </ul>

    <div class="tab-content">

        <!-- TAB 1: FORM INPUT -->
        <div class="tab-pane fade show active" id="formInput">

            <div class="card-custom">

                <form>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Loại nghỉ phép</label>
                            <select class="form-select">
                                <option>Phép năm</option>
                                <option>Nghỉ ốm</option>
                                <option>Nghỉ không lương</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Số ngày nghỉ</label>
                            <input type="number" class="form-control" placeholder="Nhập số ngày">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Từ ngày</label>
                            <input type="date" class="form-control">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Đến ngày</label>
                            <input type="date" class="form-control">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Lý do nghỉ</label>
                        <textarea class="form-control" rows="4" placeholder="Nhập lý do nghỉ phép..."></textarea>
                    </div>

                    <div class="text-end">
                        <button type="reset" class="btn btn-secondary me-2">
                            Hủy
                        </button>

                        <button type="submit" class="btn btn-success">
                            Gửi đơn
                        </button>
                    </div>

                </form>

            </div>
        </div>

        <!-- TAB 2: PDF DOWNLOAD -->
        <div class="tab-pane fade" id="pdfDownload">

            <div class="card-custom text-center">

                <h5 class="mb-3"><b>Tải mẫu đơn xin nghỉ phép</b></h5>

                <p class="text-muted">
                    Bạn có thể tải mẫu đơn chuẩn của công ty, điền thông tin và tải lên lại hệ thống.
                </p>

                <button class="btn btn-danger mb-3">
                    📥 Tải mẫu PDF
                </button>

                <hr>

                <div class="mt-3">
                    <label class="form-label">Tải lên đơn đã ký (PDF)</label>
                    <input type="file" class="form-control">
                </div>

                <div class="mt-3">
                    <button class="btn btn-primary">
                        Gửi đơn đã tải lên
                    </button>
                </div>

            </div>
        </div>

    </div>

</div>

        </div>

    </div>
</div>


</body>
</html>
